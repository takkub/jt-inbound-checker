<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { width: 520px; font: 13px/1.5 system-ui, sans-serif; color: #1a1a1a; background: #f5f5f5; }

/* Tabs */
#tabs { display: flex; background: #1565c0; }
.tab { flex: 1; padding: 8px; border: none; background: transparent; color: rgba(255,255,255,.7); cursor: pointer; font: 13px system-ui; }
.tab.active { color: #fff; border-bottom: 3px solid #fff; }

/* Panel */
.panel { padding: 12px; }

/* Not-on-JT warning */
#not-jt { padding: 16px; text-align: center; color: #c62828; background: #ffebee; border-radius: 4px; }

/* PDF upload */
#pdf-row { margin-bottom: 6px; }
#pdf-status { font-size: 11px; margin-top: 4px; color: #555; min-height: 14px; line-height: 1.4; word-break: break-all; }

/* Textarea */
#waybills { width: 100%; height: 80px; padding: 6px 8px; font: 12px monospace; border: 1px solid #ccc; border-radius: 4px; resize: vertical; }

/* Settings row */
#settings { display: flex; gap: 16px; align-items: center; margin: 8px 0 4px; font-size: 12px; color: #555; }
#settings label { display: flex; align-items: center; gap: 6px; white-space: nowrap; }
#settings input[type="number"] { width: 68px; padding: 3px 6px; border: 1px solid #ccc; border-radius: 4px; font: 13px system-ui; }

/* Controls row */
#controls { display: flex; align-items: center; gap: 8px; margin: 8px 0; }
button { padding: 5px 12px; border: 1px solid #ccc; border-radius: 4px; background: #fff; cursor: pointer; font: 13px system-ui; }
button:disabled { opacity: .4; cursor: default; }
#btn-start { background: #1565c0; color: #fff; border-color: #1565c0; }
#btn-stop  { background: #c62828; color: #fff; border-color: #c62828; }
#btn-retry { background: #e65100; color: #fff; border-color: #e65100; }
#btn-pdf   { background: #1b5e20; color: #fff; border-color: #1b5e20; }
#progress-text { margin-left: auto; font-size: 12px; color: #555; }

/* Progress bar */
#progress-bar-wrap { height: 4px; background: #e0e0e0; border-radius: 2px; margin-bottom: 10px; }
#progress-bar { height: 100%; width: 0; background: #1565c0; border-radius: 2px; transition: width .2s; }

/* Tables */
table { width: 100%; border-collapse: collapse; font-size: 12px; background: #fff; border-radius: 4px; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
th { background: #e3f2fd; padding: 6px 8px; text-align: left; font-weight: 600; color: #1565c0; }
td { padding: 5px 8px; border-top: 1px solid #f0f0f0; }
tr.pass td:nth-child(2)    { color: #2e7d32; }
tr.fail td:nth-child(2)    { color: #c62828; }
tr.scanning td:nth-child(2){ color: #1565c0; }
tr.timeout td:nth-child(2) { color: #e65100; }
tr.pending td:nth-child(2) { color: #9e9e9e; }
tr:hover td { background: #fafafa; }

/* History controls */
#history-controls { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; }
#search { flex: 1; padding: 5px 8px; border: 1px solid #ccc; border-radius: 4px; font: 13px system-ui; }
#btn-export { background: #2e7d32; color: #fff; border-color: #2e7d32; }
#btn-clear  { background: #c62828; color: #fff; border-color: #c62828; }
#history-empty { padding: 20px; text-align: center; color: #9e9e9e; }

/* Version badge */
#version-badge { margin-left: auto; padding: 0 10px; font: bold 13px system-ui; color: rgba(255,255,255,.85); align-self: center; }

/* Update banner */
#update-banner { display: flex; align-items: center; gap: 8px; padding: 7px 12px; background: #fff3cd; border-bottom: 2px solid #f0ad4e; font-size: 12px; color: #7d4e00; }
#update-banner[hidden] { display: none; }
#update-banner a { color: #7d4e00; font-weight: bold; }
#update-banner small { color: #9e6100; }
</style>
</head>
<body>

<div id="tabs">
  <button class="tab active" data-tab="scan">Scan</button>
  <button class="tab" data-tab="history">History (ไม่ผ่าน)</button>
  <span id="version-badge"></span>
</div>
<div id="update-banner" hidden>
  🔔 มี v<span id="update-version"></span> ใหม่ — <a id="update-link" href="#" target="_blank">กดโหลด</a>
  <small id="update-notes"></small>
  <small style="margin-left:4px;">· หลังโหลด: Extensions → J&T Inbound Checker → Reload</small>
</div>

<!-- Scan panel -->
<div id="scan" class="panel">
  <div id="not-jt" hidden>
    <p>กรุณาเปิดหน้า <strong>J&T Shipping Inbound</strong> แล้วกด extension icon อีกครั้ง</p>
    <div id="active-scan-banner" hidden style="margin-top:10px;padding:10px;background:#e3f2fd;border-radius:4px;color:#1565c0;">
      <p id="active-scan-info" style="font-weight:600;"></p>
      <button id="btn-goto-jt" style="margin-top:8px;background:#1565c0;color:#fff;border-color:#1565c0;">→ ไปที่แท็บ J&T</button>
    </div>
  </div>
  <div id="scan-ui">
    <div id="pdf-row">
      <button id="btn-pdf">⬆ อัปโหลด PDF ใบปะหน้า</button>
      <input id="pdf-input" type="file" accept=".pdf" multiple hidden>
      <div id="pdf-status"></div>
    </div>
    <textarea id="waybills" placeholder="วางเลข waybill ที่นี่ หรืออัปโหลด PDF ด้านบน"></textarea>
    <div id="settings">
      <label>หน่วงเวลา (ms) <input id="delay-ms" type="number" min="100" max="10000" step="100" value="1000"></label>
      <label>Retry รอบ <input id="retry-rounds" type="number" min="0" max="10" value="2"></label>
    </div>
    <div id="controls">
      <button id="btn-start">▶ Start</button>
      <button id="btn-stop" disabled>■ Stop</button>
      <button id="btn-retry" disabled>↺ Retry failed</button>
      <span id="progress-text"></span>
    </div>
    <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
    <table>
      <thead><tr><th>Waybill</th><th>สถานะ</th><th>ข้อความ</th></tr></thead>
      <tbody id="results-body"></tbody>
    </table>
  </div>
</div>

<!-- History panel -->
<div id="history" class="panel" hidden>
  <div id="history-controls">
    <input id="search" type="text" placeholder="ค้นหา waybill...">
    <button id="btn-export">⬇ Export CSV</button>
    <button id="btn-clear">🗑 Clear All</button>
  </div>
  <table>
    <thead><tr><th>Waybill</th><th>Error</th><th>เวลา</th></tr></thead>
    <tbody id="history-body"></tbody>
  </table>
  <p id="history-empty" hidden>ยังไม่มีข้อมูล</p>
</div>

<script src="popup.js"></script>
</body>
</html>
